version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: backend_ai_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biz_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

  # Redis 캐시
  redis:
    image: redis:7-alpine
    container_name: backend_ai_redis
    ports:
      - "6379:6379"
    networks:
      - backend_network

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_ai_app
    environment:
      # OpenAI API Key
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Google API Key
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}

      # Main DB
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: biz_table
      DB_USER: postgres
      DB_PASSWORD: postgres

      # Vector DB
      VECTOR_DB_HOST: postgres
      VECTOR_DB_PORT: 5432
      VECTOR_DB_NAME: biz_rag
      VECTOR_DB_USER: postgres
      VECTOR_DB_PASSWORD: postgres

      # Redis 캐시
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # API 보안
      API_KEYS: ${API_KEYS:-}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./app:/testcase-doc-rag/app
      - ./tests:/testcase-doc-rag/tests:ro
      - ./pytest.ini:/testcase-doc-rag/pytest.ini:ro
    networks:
      - backend_network
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: backend_ai_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    depends_on:
      - app
    networks:
      - backend_network
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: backend_ai_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - backend_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  backend_network:
    driver: bridge
