name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 app/ \
            --max-line-length=120 \
            --exclude=__pycache__,.venv \
            --ignore=E127,E203,E231,E251,E261,E262,E265,E266,E302,E303,E402,E501,W291,W292,W293,W503,W504,F401,F811

  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install \
            fastapi==0.115.0 \
            pytest==8.3.2 \
            pytest-asyncio==0.24.0 \
            httpx==0.27.0 \
            structlog==24.4.0 \
            python-dotenv==1.0.1 \
            pydantic==2.9.2 \
            prometheus-client \
            prometheus-fastapi-instrumentator

      - name: Run tests
        env:
          GOOGLE_API_KEY: dummy-for-test
          API_KEYS: ""
          REDIS_HOST: ""
        run: python -m pytest tests/ -v --tb=short
