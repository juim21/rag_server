name: Sync → pagopago-crm/rag_server (hyunbin_dev)

on:
  push:
    branches: [main]

jobs:
  sync:
    name: Push to pagopago-crm hyunbin_dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to pagopago-crm/rag_server@hyunbin_dev
        env:
          PAGOPAGO_TOKEN: ${{ secrets.PAGOPAGO_TOKEN }}
        run: |
          if [ -z "${PAGOPAGO_TOKEN}" ]; then
            echo "PAGOPAGO_TOKEN secret not set — skipping sync"
            exit 0
          fi
          # actions/checkout이 설정한 GITHUB_TOKEN extraheader 제거
          # 그대로 두면 PAGOPAGO_TOKEN 대신 GITHUB_TOKEN으로 push를 시도해 403 발생
          git config --local --unset http.https://github.com/.extraheader || true
          git remote add pagopago https://x-access-token:${PAGOPAGO_TOKEN}@github.com/pagopago-crm/rag_server.git
          git push pagopago main:hyunbin_dev --force
